<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="ui.css" />
  <title>Cài đặt</title>
</head>
<body>
  <div id="bootErr" style="display:none; background:#5a1f1f; color:#ffd; padding:8px; border-radius:6px; font-size:12px; white-space:pre-wrap;"></div>
  <script>
    (function () {
      function show(m) {
        var e = document.getElementById('bootErr');
        if (e) { e.style.display = 'block'; e.textContent += m + '\n'; }
      }
      window.addEventListener('error', function (ev) {
        show('Lỗi JS: ' + (ev.message || '') + ' @ ' + (ev.filename || '').split('/').pop() + ':' + (ev.lineno || ''));
      });
      window.addEventListener('unhandledrejection', function (ev) {
        show('Promise lỗi: ' + (ev.reason && ev.reason.message ? ev.reason.message : ev.reason));
      });
    })();
  </script>
  <h2>⚙️ Cài đặt</h2>

  <div>
    <label>Nhà cung cấp AI</label>
    <select id="provider">
      <option value="anthropic">Anthropic (Claude)</option>
      <option value="gemini">Google Gemini</option>
    </select>
  </div>

  <div id="anthropicBlock">
    <div>
      <label>Anthropic API key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." />
    </div>
    <div style="margin-top:8px;">
      <label>Claude model</label>
      <div class="row tight">
        <select id="model" style="flex:1;">
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (nhanh, rẻ)</option>
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (cân bằng)</option>
          <option value="claude-opus-4-8">Claude Opus 4.8 (mạnh nhất)</option>
        </select>
        <button class="ghost" id="loadClaudeModels" style="flex:0 0 auto;" type="button">↻ Tải model</button>
      </div>
      <div class="status" id="claudeModelStatus"></div>
    </div>
  </div>

  <div id="geminiBlock">
    <div>
      <label>Gemini API key</label>
      <input type="password" id="geminiKey" placeholder="AIza..." />
    </div>
    <div style="margin-top:8px;">
      <label>Gemini model</label>
      <div class="row tight">
        <select id="geminiModel" style="flex:1;">
          <option value="gemini-2.5-pro">Gemini 2.5 Pro (mạnh nhất)</option>
          <option value="gemini-2.5-flash">Gemini 2.5 Flash (cân bằng)</option>
          <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (nhanh/rẻ)</option>
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash-Lite</option>
        </select>
        <button class="ghost" id="loadGeminiModels" style="flex:0 0 auto;" type="button">↻ Tải model</button>
      </div>
      <div class="status" id="geminiModelStatus"></div>
    </div>
  </div>

  <div>
    <label>Ngôn ngữ dịch mặc định</label>
    <select id="target">
      <option value="vi">Tiếng Việt</option>
      <option value="en">Tiếng Anh</option>
      <option value="ja">Tiếng Nhật</option>
    </select>
  </div>

  <div>
    <label>Ngữ cảnh dịch mặc định</label>
    <select id="defaultContext">
      <option value="">(Không dùng ngữ cảnh)</option>
    </select>
    <div class="status" style="margin-top:2px;">Dùng khi click nhanh bông hoa (dịch ngay).</div>
  </div>

  <div>
    <label>Danh sách ngữ cảnh có sẵn</label>
    <div id="contextList" style="display:flex; flex-direction:column; gap:4px;"></div>
    <div class="row tight" style="margin-top:4px;">
      <input type="text" id="newContext" placeholder="Thêm ngữ cảnh mới..." />
      <button class="ghost" id="addContext" style="flex:0 0 auto;" type="button">+ Thêm</button>
    </div>
  </div>

  <div>
    <label>Model Live2D tự thêm</label>
    <div id="customModelList" style="display:flex; flex-direction:column; gap:4px;"></div>
    <button class="ghost" id="addModelFolder" type="button" style="margin-top:4px;">📁 Chọn thư mục model...</button>
    <div class="status" id="modelFolderStatus"></div>
    <div class="status" style="margin-top:2px;">Chọn thư mục chứa file <b>*.model3.json</b> (tải từ mạng về). Sau khi thêm, chọn model trong menu chuột phải → Diện mạo.</div>
  </div>

  <div class="row" style="align-items:center;">
    <label style="flex:1;">Tự hiện bông hoa khi bôi đen văn bản</label>
    <input type="checkbox" id="autoFlower" style="flex:0 0 auto;" />
  </div>

  <div class="row" style="align-items:center;">
    <label style="flex:1;">Khởi động cùng Windows</label>
    <input type="checkbox" id="autostart" style="flex:0 0 auto;" />
  </div>

  <div>
    <label>Phím tắt bắt văn bản</label>
    <div class="row tight">
      <input type="text" id="hotkey" readonly placeholder="Bấm vào đây rồi nhấn tổ hợp phím..." style="flex:1; cursor:pointer;" />
      <button class="ghost" id="hotkeyReset" style="flex:0 0 auto;" type="button">Mặc định</button>
    </div>
    <div class="status" id="hotkeyStatus" style="margin-top:2px;">Bấm vào ô rồi nhấn tổ hợp (vd: Ctrl+Shift+D). Áp dụng khi Lưu.</div>
  </div>

  <button class="action" id="saveBtn">Lưu cài đặt</button>
  <div class="status" id="status"></div>

  <script src="js/tauri-api.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
