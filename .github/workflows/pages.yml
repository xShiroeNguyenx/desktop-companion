name: Deploy landing page

# Publish docs/landing to GitHub Pages on every push to main (or manually).
# Site URL: https://xshiroenguyenx.github.io/desktop-companion/
on:
  push:
    branches: [main, master]
    paths:
      - "docs/landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload landing page
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
